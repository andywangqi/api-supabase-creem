<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>后台数据</title>
    <link rel="stylesheet" href="/admin.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Admin</p>
          <h1>运营后台</h1>
        </div>
        <form class="auth" id="authForm">
          <input id="adminKey" name="adminKey" type="password" autocomplete="off" placeholder="ADMIN_API_KEY">
          <select id="days" name="days" aria-label="天数">
            <option value="7">7 天</option>
            <option value="30" selected>30 天</option>
            <option value="90">90 天</option>
            <option value="120">120 天</option>
          </select>
          <button type="submit">刷新</button>
        </form>
      </header>

      <section class="metrics" aria-label="核心指标">
        <article class="metric">
          <span>总用户数</span>
          <strong id="totalUsers">-</strong>
        </article>
        <article class="metric">
          <span>当天用户数</span>
          <strong id="todayUsers">-</strong>
        </article>
        <article class="metric">
          <span>当天收入</span>
          <strong id="todayRevenue">-</strong>
        </article>
        <article class="metric">
          <span>总收入</span>
          <strong id="totalRevenue">-</strong>
        </article>
      </section>

      <section class="panel">
        <div class="panelHead">
          <div>
            <h2>每日收入</h2>
            <p id="updatedAt">等待加载</p>
          </div>
          <span id="localDate" class="pill">-</span>
        </div>
        <div id="chart" class="chart" aria-label="每日收入柱状图"></div>
      </section>

      <section class="panel">
        <div class="panelHead">
          <h2>收入明细</h2>
        </div>
        <div class="tableWrap">
          <table>
            <thead>
              <tr>
                <th>日期</th>
                <th>收入</th>
                <th>支付数</th>
              </tr>
            </thead>
            <tbody id="dailyRows"></tbody>
          </table>
        </div>
      </section>

      <p id="status" class="status" role="status"></p>
    </main>
    <script src="/admin.js"></script>
  </body>
</html>
