<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Login</title>
    <link rel="stylesheet" href="/admin.css?v=20260515-location">
  </head>
  <body>
    <main class="authShell">
      <section class="authCard">
        <p class="eyebrow">Admin</p>
        <h1>Sign in</h1>
        <form id="loginForm" class="loginForm">
          <label>
            <span>Admin key</span>
            <input id="adminKey" name="adminKey" type="password" autocomplete="current-password" required autofocus>
          </label>
          <button type="submit">Enter dashboard</button>
        </form>
        <p id="loginStatus" class="status" role="status"></p>
      </section>
    </main>
    <script src="/admin-login.js?v=20260515-location"></script>
  </body>
</html>
